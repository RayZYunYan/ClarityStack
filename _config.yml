title: ClarityStack
description: "Curated AI news and analysis for builders — what matters, what's overhyped, and what to try next."
url: https://claritystack.pages.dev
baseurl: ""
source: site
destination: _site
lang: en-US
timezone: America/Los_Angeles
permalink: /:year/:month/:day/:title/
markdown: kramdown
highlighter: rouge
include:
  - _headers
  - _redirects
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
excerpt_separator: "\n\n"
paginate: 6
paginate_path: "/page:num/"
plugins:
  - jekyll-paginate
