name: Deploy Blog

on:
  push:
    branches:
      - main
      - master
    paths:
      - "site/**"
      - "_config.yml"
      - "_config.github-pages.yml"
      - "Gemfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Install dependencies
        run: |
          bundle config set path vendor/bundle
          bundle install
      - name: Build site for GitHub Pages mirror
        run: bundle exec jekyll build --config _config.yml,_config.github-pages.yml --destination _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
